services:
  alpaca-indexer:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-indexer
    restart: "no"
    command: python /app/alpaca-puller.py reindex
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
    environment:
      MODELS_DIR: /models
      ROUTER_MODELS_DIR: /router-models

  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.llama-server
    container_name: llama-server
    restart: always
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock: -1
    ports:
      - "8080:8080"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
      - ./.slots-cache:/slots-cache
      - ./llama-server-flags.py:/scripts/llama-server-flags.py:ro
      - ./llama-server-entrypoint.sh:/scripts/llama-server-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/llama-server-entrypoint.sh"]
    depends_on:
      alpaca-indexer:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 31G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  alpaca-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-proxy
    restart: always
    network_mode: "host"
    volumes:
      - /usr/share/ollama/.ollama/models:/models
      - ./.alpaca-router:/router-models
      - ./.slots-cache:/slots-cache
      - /var/run/docker.sock:/var/run/docker.sock
      - ./alpaca-proxy.py:/app/alpaca-proxy.py:ro
      - ./alpaca-puller.py:/app/alpaca-puller.py:ro
      - ./alpaca_puller.py:/app/alpaca_puller.py:ro
      - ./benchmark-configs.py:/app/benchmark-configs.py:ro
      - ./analyzer.py:/app/analyzer.py:ro
      - ./data:/app/data
    environment:
      MODELS_DIR: /models
      ROUTER_MODELS_DIR: /router-models
      SLOTS_CACHE_DIR: /slots-cache
      TELEMETRY_DIR: /app/data/telemetry
      LLAMA_SERVER_URL: "http://localhost:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      alpaca-indexer:
        condition: service_completed_successfully
      llama-server:
        condition: service_started

  alpaca-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: alpaca-web
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./web:/app/web:ro
      - ./llm_benchmark_suite.py:/app/llm_benchmark_suite.py:ro
      - ./alpaca-puller.py:/app/alpaca-puller.py:ro
      - ./alpaca_puller.py:/app/alpaca_puller.py:ro
      - ./.alpaca-router:/router-models
      - ./analyzer.py:/app/analyzer.py:ro
      - /usr/share/ollama/.ollama/models:/models
    env_file:
      - ./.env
    environment:
      OLLAMA_SERVER_URLS: "http://llama-server:8080"
      PROXY_SERVER_URLS: "http://host.docker.internal:11434"
      ROUTER_MODELS_DIR: "/router-models"
      MODELS_DIR: "/models"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      alpaca-proxy:
        condition: service_started
      llama-server:
        condition: service_started

  alpaca-telemetry:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-telemetry
    restart: always
    command: python /app/telemetry_monitor.py
    mem_limit: 256m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.alpaca-router:/router-models
      - ./data:/app/data
      - ./telemetry_monitor.py:/app/telemetry_monitor.py:ro
    environment:
      TELEMETRY_DIR: /app/data/telemetry
      LLAMA_SERVER_URL: http://llama-server:8080
      LLAMA_DOCKER_CONTAINER: llama-server
    depends_on:
      llama-server:
        condition: service_started
