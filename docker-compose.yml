services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
    command: >
      --host 0.0.0.0
      --port 8080
      --models-dir /models/blobs
      --n-gpu-layers 999
      --sleep-idle-seconds 300
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  alpaca-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-proxy
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - llama-server
