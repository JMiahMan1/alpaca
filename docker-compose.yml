services:
  alpaca-indexer:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-indexer
    restart: always
    command: >
      sh -lc "while true; do
        python /app/alpaca-puller.py reindex;
        sleep 300;
      done"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
    environment:
      MODELS_DIR: /models
      ROUTER_MODELS_DIR: /router-models

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b9191
    container_name: llama-server
    restart: always
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock: -1
    ports:
      - "8080:8080"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
    command: >
      --host 0.0.0.0
      --port 8080
      --models-dir /router-models
      -ngl 99
      --n-cpu-moe 38
      --no-mmap
      --mlock
      --cache-type-k q8_0
      --cache-type-v q8_0
      --spec-type draft-mtp
      --spec-draft-n-max 3
      -c 65536
      -t 8
    depends_on:
      - alpaca-indexer
    deploy:
      resources:
        limits:
          memory: 26G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  alpaca-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-proxy
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
    environment:
      ROUTER_MODELS_DIR: /router-models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - alpaca-indexer
      - llama-server
