services:
  alpaca-indexer:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-indexer
    restart: "no"
    command: python /app/alpaca-puller.py reindex
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
    environment:
      MODELS_DIR: /models
      ROUTER_MODELS_DIR: /router-models

  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b9191
    container_name: llama-server
    restart: always
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock: -1
    ports:
      - "8080:8080"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
      - ./llama-server-flags.py:/scripts/llama-server-flags.py:ro
      - ./llama-server-entrypoint.sh:/scripts/llama-server-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/scripts/llama-server-entrypoint.sh"]
    depends_on:
      alpaca-indexer:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 26G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  alpaca-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: alpaca-proxy
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - /usr/share/ollama/.ollama/models:/models:ro
      - ./.alpaca-router:/router-models
    environment:
      ROUTER_MODELS_DIR: /router-models
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      alpaca-indexer:
        condition: service_completed_successfully
      llama-server:
        condition: service_started
