name: Build and Push sd-server CUDA Image

on:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile.sd-server'
      - 'sd-entrypoint.sh'
      - '.github/workflows/build-sd-cuda.yml'
  workflow_dispatch: # allows manual triggering

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.sd-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/alpaca-sd-server:latest
            ghcr.io/${{ github.repository_owner }}/alpaca-sd-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
