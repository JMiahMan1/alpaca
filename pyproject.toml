[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["scratch", ".venv", "venv", "__pycache__", "node_modules", "dist", "build"]

[tool.ruff.lint]
# E/F/W = pycodestyle + pyflakes, I = isort, UP/B/SIM/RUF = quality rules.
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
# Line length is owned by the formatter.
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"
addopts = "-q"
